<div class="name-sub-title-container" [class.has-sub-title]="!!training.subTitle">
  <p class="name">{{ training.name }}</p>
  <p class="sub-title" *ngIf="training.subTitle">{{ training.subTitle }}</p>
</div>
<span class="circle"></span>
<p class="year">
  <mat-icon>today</mat-icon>
  {{ training.year }}
</p>
